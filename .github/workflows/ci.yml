name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Test VS Code extension
        working-directory: packages/vscode
        run: |
          npm install
          npx tsc --noEmit
          npx vitest run
          node esbuild.js
