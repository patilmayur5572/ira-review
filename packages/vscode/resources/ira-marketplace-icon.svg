<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="url(#bg)"/>
  <!-- Brain left hemisphere -->
  <path d="M64 30 C50 30 40 38 38 48 C34 48 30 52 30 58 C30 64 34 68 38 68 C38 74 42 82 50 86 C54 88 58 90 64 90"
    fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brain right hemisphere -->
  <path d="M64 30 C78 30 88 38 90 48 C94 48 98 52 98 58 C98 64 94 68 90 68 C90 74 86 82 78 86 C74 88 70 90 64 90"
    fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brain center line -->
  <line x1="64" y1="30" x2="64" y2="90" stroke="#4c1d95" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- Neural circuit nodes -->
  <circle cx="50" cy="50" r="4" fill="#7c3aed"/>
  <circle cx="78" cy="50" r="4" fill="#a78bfa"/>
  <circle cx="44" cy="66" r="3.5" fill="#7c3aed"/>
  <circle cx="84" cy="66" r="3.5" fill="#a78bfa"/>
  <circle cx="64" cy="60" r="4.5" fill="#c4b5fd"/>
  <!-- Neural connections -->
  <line x1="50" y1="50" x2="64" y2="60" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="78" y1="50" x2="64" y2="60" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="44" y1="66" x2="64" y2="60" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="84" y1="66" x2="64" y2="60" stroke="#a78bfa" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Small code brackets at bottom -->
  <text x="48" y="108" font-family="monospace" font-size="16" font-weight="bold" fill="#6d28d9" opacity="0.8">&lt;</text>
  <text x="72" y="108" font-family="monospace" font-size="16" font-weight="bold" fill="#6d28d9" opacity="0.8">/&gt;</text>
</svg>
